<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- HTML-1: lang updated to match saved preference before JS runs -->
  <script>try { document.documentElement.lang = localStorage.getItem('oto_lang') || 'ja'; } catch (_) {}</script>
  <!-- HTML-2: data-i18n so applyDOM() keeps title in sync -->
  <title data-i18n="window.main">oTo</title>
  <link rel="stylesheet" href="/src/common.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- SVG background (filled by svg-controller.js) -->
  <div id="bg-container"></div>

  <!-- UI overlay -->
  <div id="ui-overlay">
    <!-- Format selector -->
    <div id="format-selector">
      <!-- ENCODE formats: 非可逆(MP3/AAC/OPUS) → 可逆(FLAC/ALAC) -->
      <button class="fmt-btn active" data-fmt="mp3" aria-pressed="true">MP3</button>
      <button class="fmt-btn" data-fmt="aac" aria-pressed="false">AAC</button>
      <button class="fmt-btn" data-fmt="opus" aria-pressed="false">OPUS</button>
      <button class="fmt-btn" data-fmt="flac" aria-pressed="false">FLAC</button>
      <button class="fmt-btn" data-fmt="alac" aria-pressed="false">ALAC</button>
      <!-- DECODE formats -->
      <button class="decode-fmt-btn active" data-fmt="wav" aria-pressed="true">WAV</button>
      <button class="decode-fmt-btn" data-fmt="aiff" aria-pressed="false">AIFF</button>
    </div>

    <!-- Mode toggle: encode / decode -->
    <div id="toggle-area">
      <span class="toggle-label">ENCODE</span>
      <label class="toggle-switch">
        <input type="checkbox" id="mode-toggle" aria-label="ENCODE / DECODE" />
        <span class="slider"></span>
      </label>
      <span class="toggle-label">DECODE</span>
    </div>
  </div>

  <!-- Context menu -->
  <div id="context-menu">
    <div class="menu-item" id="menu-settings" data-i18n="menu.settings">設定</div>
    <div class="menu-separator"></div>
    <div class="menu-item" id="menu-about" data-i18n="menu.about">バージョン情報</div>
  </div>

  <!-- Pause dialog -->
  <div id="pause-dialog" class="pause-dialog hidden">
    <div class="pause-dialog-box">
      <p class="pause-dialog-msg" data-i18n="dialog.pauseMsg">変換を一時停止しました</p>
      <div class="pause-dialog-btns">
        <button id="btn-resume" data-i18n="dialog.resume">続ける</button>
        <button id="btn-cancel-job" data-i18n="dialog.cancelJob">中止する</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
