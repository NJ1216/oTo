<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>無音トリミング - 詳細設定</title>
  <link rel="stylesheet" href="preview.css" />
</head>
<body>
  <div id="app">
    <div id="drop-zone" class="drop-zone">
      <p id="drop-hint" class="drop-hint">音声ファイルをここにドロップ</p>
      <div id="file-info" class="file-info hidden">
        <span id="file-name" class="file-name"></span>
        <span id="file-duration" class="file-duration"></span>
      </div>
    </div>

    <div id="waveform-wrap" class="waveform-wrap">
      <canvas id="waveform" class="waveform"></canvas>
      <div id="selection-overlay" class="selection-overlay"></div>
      <div id="waveform-empty" class="waveform-empty">
        ファイルをドロップすると波形が表示されます
      </div>
    </div>

    <div id="controls" class="controls">
      <div class="ctrl-row">
        <label id="label-db">検出レベル</label>
        <input type="number" id="previewDb" min="-100" max="-1" step="1" value="-80" />
        <span class="unit">dB</span>
        <label id="label-dur">最短無音時間</label>
        <input type="number" id="previewDurationMs" min="10" max="2000" step="10" value="50" />
        <span class="unit">ms</span>
        <span id="analyze-status" class="analyze-status"></span>
      </div>
      <div class="ctrl-row zoom-hint-row">
        <span id="zoom-hint" class="zoom-hint">g/h: 横ズーム　Shift+g/h: 縦ズーム　クリック: リセット</span>
      </div>
      <div class="legend-row">
        <span class="legend-swatch silence-swatch"></span>
        <span id="legend-silence" class="legend-label">除去される無音領域</span>
        <span class="legend-swatch keep-swatch"></span>
        <span id="legend-keep" class="legend-label">保持される音声</span>
      </div>

    </div>
  </div>
  <script type="module" src="preview.js"></script>
</body>
</html>
