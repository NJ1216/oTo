name: Build & Release

# ─────────────────────────────────────────────
# トリガー設定
# ─────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # 手動実行も可能

# ─────────────────────────────────────────────
# Job 1: Lint（clippy + ESLint）
# ─────────────────────────────────────────────
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: pnpm セットアップ
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Rust インストール
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust ビルドキャッシュ
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: JS パッケージインストール
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Vitest（ユニットテスト）
        run: pnpm test

      - name: cargo clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: cargo test（Rust ユニットテスト）
        run: cargo test
        working-directory: src-tauri

# ─────────────────────────────────────────────
# Job 2: Windows ビルド
# ─────────────────────────────────────────────
  build:
    runs-on: windows-latest
    needs: lint

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: pnpm セットアップ
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Rust インストール
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust ビルドキャッシュ
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: JS パッケージインストール
        run: pnpm install --frozen-lockfile

      - name: Tauri ビルド
        run: pnpm tauri build --no-bundle

      # ── Windows: ポータブル exe を保存 ────────────
      - name: Artifact 保存
        uses: actions/upload-artifact@v4
        with:
          name: oTo-Windows
          path: src-tauri/target/release/oto.exe
          if-no-files-found: warn

# ─────────────────────────────────────────────
# Job 2: Draft Release 作成（タグ push 時のみ）
# ─────────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ビルド成果物をダウンロード
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: GitHub Releases に Draft として登録
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: 'oTo ${{ github.ref_name }}'
          body: |
            アセット（Assets）からお使いのOSに合ったファイルをダウンロードしてください。

            | ファイル | 対象OS |
            |----------|--------|
            | `oto.exe` | Windows（インストール不要・単体実行ファイル） |

            **macOS** のバイナリは別途リリースページにアップロードされます。
          files: artifacts/**
