name: Build & Release

# ─────────────────────────────────────────────
# トリガー設定
# ─────────────────────────────────────────────
on:
  push:
    branches: [main]        # mainへのpush → ビルドしてArtifactに保存
    tags:
      - 'v*'                # v1.0.0 などのタグpush → GitHub Releaseを作成
  workflow_dispatch:        # GitHub画面から手動実行も可能

jobs:
  build:
    strategy:
      fail-fast: false      # 一方が失敗しても他方は続行する
      matrix:
        include:
          - platform: macos-latest    # Mac用ビルド
          - platform: windows-latest  # Windows用ビルド

    runs-on: ${{ matrix.platform }}

    steps:
      # ① リポジトリのコードを取得
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # ② Node.js をセットアップ（npm ci 高速化のためキャッシュあり）
      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ③ Rust (stable) をインストール
      - name: Rust インストール
        uses: dtolnay/rust-toolchain@stable

      # ④ Rust のビルドキャッシュ（2回目以降を大幅に高速化）
      - name: Rust ビルドキャッシュ
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ⑤ npm パッケージをインストール
      - name: npm パッケージインストール
        run: npm ci

      # ─── タグ push 時: ビルド + GitHub Release 作成 ───────────────
      - name: ビルド & GitHub Release 作成 (タグ push 時)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'oTo ${{ github.ref_name }}'
          releaseBody: 'アセット（Assets）からお使いのOSに合ったファイルをダウンロードしてください。'
          releaseDraft: false
          prerelease: false

      # ─── 通常 push 時: ビルドのみ ─────────────────────────────────
      - name: ビルド (通常 push 時)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ⑥ ビルド成果物を保存 — macOS (.dmg)
      - name: Artifact 保存 (macOS)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.platform == 'macos-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: oTo-macOS
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      # ⑦ ビルド成果物を保存 — Windows (.msi / .exe)
      - name: Artifact 保存 (Windows)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.platform == 'windows-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: oTo-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
