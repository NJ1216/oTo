name: Build & Release

# ─────────────────────────────────────────────
# トリガー設定
# ─────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # 手動実行も可能
    inputs:
      label:
        description: '実行ラベル（例: "fix: clippy警告修正"）'
        required: false
        default: '手動チェック'

run-name: >-
  ${{ startsWith(github.ref, 'refs/tags/')
      && format('Release {0}', github.ref_name)
      || format('CI [{0}] {1}', github.ref_name, inputs.label) }}

# ─────────────────────────────────────────────
# Job 1: Lint（clippy + ESLint）
# ─────────────────────────────────────────────
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Linux システム依存パッケージのインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: pnpm セットアップ
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Node.js セットアップ
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Rust インストール
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: cargo-about をインストール
        run: cargo install --locked cargo-about --features cli

      - name: Rust ビルドキャッシュ
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: JS パッケージインストール
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Vitest（ユニットテスト）
        run: pnpm test

      - name: cargo clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: 第三者ライセンス通知の同期チェック
        run: |
          pnpm licenses:generate
          git diff --exit-code -- src/licenses.html

      - name: cargo test（Rust ユニットテスト）
        run: cargo test
        working-directory: src-tauri

      - name: バージョン同期チェック (package.json ↔ Cargo.toml)
        run: |
          PKG_VER=$(grep -m1 '"version"' package.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          CARGO_VER=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          TAURI_VER=$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version")
          echo "package.json: $PKG_VER"
          echo "Cargo.toml:   $CARGO_VER"
          echo "tauri.conf.json: $TAURI_VER"
          if [ "$PKG_VER" != "$CARGO_VER" ] || [ "$PKG_VER" != "$TAURI_VER" ]; then
            echo "::error::Version mismatch: package.json=$PKG_VER, Cargo.toml=$CARGO_VER, tauri.conf.json=$TAURI_VER"
            exit 1
          fi

# ─────────────────────────────────────────────
# Job 2: Windows ビルド
# ─────────────────────────────────────────────
  build:
    runs-on: windows-latest
    needs: lint

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: pnpm セットアップ
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Node.js セットアップ
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Rust インストール
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust ビルドキャッシュ
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: JS パッケージインストール
        run: pnpm install --frozen-lockfile

      - name: フロントエンドをビルド
        run: pnpm build

      - name: Tauri ビルド
        run: pnpm tauri build --no-bundle

      # ── Windows: ポータブル exe を保存 ────────────
      - name: Artifact 保存
        uses: actions/upload-artifact@v6
        with:
          name: oTo-Windows
          path: src-tauri/target/release/oto.exe
          if-no-files-found: warn

# ─────────────────────────────────────────────
# Job 3: Release 公開（タグ push 時のみ）
# ─────────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ビルド成果物をダウンロード
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: リリースノートを作成
        id: release_notes
        run: |
          set -euo pipefail
          RELEASE_NOTES_PATH="release-body.md"
          node scripts/polish-release-notes.mjs --output "$RELEASE_NOTES_PATH" "${{ github.ref_name }}"
          echo "path=$RELEASE_NOTES_PATH" >> "$GITHUB_OUTPUT"

      - name: GitHub Releases に公開
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: ${{ steps.release_notes.outputs.path }}
          name: 'oTo ${{ github.ref_name }}'
          files: artifacts/**
