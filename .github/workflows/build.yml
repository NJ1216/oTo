name: Build & Release

# ─────────────────────────────────────────────
# トリガー設定
# ─────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # 手動実行も可能

# ─────────────────────────────────────────────
# Job 1: ビルド（Mac / Windows を並列実行）
# ─────────────────────────────────────────────
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Rust インストール
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Rust ビルドキャッシュ
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: npm パッケージインストール
        run: npm ci

      - name: Tauri ビルド
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri

      # ── macOS: .dmg を保存 ───────────────────────
      - name: Artifact 保存 (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: oTo-macOS
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      # ── Windows: ポータブル exe をリネーム ────────
      - name: ポータブル exe を準備 (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: Copy-Item "src-tauri/target/release/oto.exe" "src-tauri/target/release/oTo-portable.exe"

      # ── Windows: .msi / .exe / ポータブル を保存 ─
      - name: Artifact 保存 (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: oTo-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/oTo-portable.exe
          if-no-files-found: warn

# ─────────────────────────────────────────────
# Job 2: Draft Release 作成（タグ push 時のみ）
# ─────────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ビルド成果物をダウンロード
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: GitHub Releases に Draft として登録
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: 'oTo ${{ github.ref_name }}'
          body: |
            アセット（Assets）からお使いのOSに合ったファイルをダウンロードしてください。

            | ファイル | 対象OS |
            |----------|--------|
            | `*.dmg`  | macOS  |
            | `*.msi`  | Windows（MSIインストーラー） |
            | `*-Setup.exe` | Windows（NSSインストーラー） |
            | `oTo-portable.exe` | Windows（インストール不要・単体実行ファイル） |
          files: artifacts/**
