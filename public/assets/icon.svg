<?xml version="1.0" encoding="utf-8"?>
<!--
  Oto App Icon for macOS
  Minimal & Cool Design
-->
<svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 viewBox="0 0 1024 1024" style="enable-background:new 0 0 1024 1024;" xml:space="preserve">
<style type="text/css">
	.st0{fill:url(#SVGID_1_);}
	.st1{opacity:0.2;fill:#FFFFFF;}
	.st2{fill:none;stroke:#FBFBFB;stroke-width:32;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:10;}
</style>

<!-- 1. Background Cage (macOS Standard Rounded Rectangle with Subtle Gradient) -->
<linearGradient id="SVGID_1_" gradientUnits="userSpaceOnUse" x1="512" y1="1024" x2="512" y2="0">
	<stop  offset="0" style="stop-color:#1A1A1A"/>
	<stop  offset="1" style="stop-color:#333333"/>
</linearGradient>
<rect x="0" y="0" class="st0" width="1024" height="1024" rx="224" ry="224"/>

<!-- 2. Subtle Top Light Highlight (for that "cool" metallic/glass feel) -->
<path class="st1" d="M224,0h576c123.7,0,224,100.3,224,224v100c0,123.7-100.3,224-224,224H224C100.3,548,0,447.7,0,324V224
	C0,100.3,100.3,0,224,0z"/>

<!-- 3. The "Oto" Geometric Logo -->
<!-- It represents: Input (Circle), Conversion Axis (T-shape), Output (Circle) -->
<g>
	<!-- Left 'O' -->
	<circle class="st2" cx="300" cy="512" r="100"/>
	
	<!-- Center 'T' (Simplified and integrated) -->
	<line class="st2" x1="512" y1="362" x2="512" y2="662"/>
	<line class="st2" x1="412" y1="362" x2="612" y2="362"/>
	
	<!-- Right 'O' -->
	<circle class="st2" cx="724" cy="512" r="100"/>
</g>

</svg>
