<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- ダークモード背景 -->
  <rect width="400" height="400" fill="#1a1a2e" />

  <!-- フィルター定義 -->
  <defs>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="1" />
      <stop offset="100%" stop-color="#E68900" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <!-- イコライザー風脈動円（処理中は加速） -->
  <circle cx="200" cy="200" r="108" fill="none" stroke="#FF9800" stroke-width="1" opacity="0.08"
    stroke-dasharray="2,6,4,6,5,6,3,6,6,6">
    <animate attributeName="r" values="108;112;108" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.08;0.12;0.08" dur="3s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="rotate" values="0 200 200;360 200 200" dur="15s" repeatCount="indefinite" />
  </circle>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#FF9800" stroke-width="1.2" opacity="0.1"
    stroke-dasharray="5,4,8,4,3,4,10,4,6,4">
    <animate attributeName="r" values="100;104;100" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.1;0.15;0.1" dur="2.5s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="rotate" values="360 200 200;0 200 200" dur="10s" repeatCount="indefinite" />
  </circle>
  <circle cx="200" cy="200" r="94" fill="none" stroke="#FF9800" stroke-width="1.5" opacity="0.12"
    stroke-dasharray="3,3,6,3,9,3,4,3,7,3">
    <animate attributeName="r" values="94;96;94" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.12;0.18;0.12" dur="2s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="rotate" values="0 200 200;360 200 200" dur="7s" repeatCount="indefinite" />
  </circle>

  <!-- プログレスバー弧（JSで stroke-dashoffset を制御） -->
  <path d="M 120 200 A 80 80 0 0 0 280 200" fill="none" stroke="#FF9800" stroke-width="4" stroke-linecap="round"
    stroke-dasharray="251.327 251.328"
    stroke-dashoffset="251.327">
    <animate attributeName="stroke-dashoffset" values="251.327;0" dur="5s" repeatCount="indefinite" />
  </path>

  <!-- メインテキスト（形式） -->
  <text x="50%" y="45%" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="100"
    fill="url(#textGradient)" filter="url(#softGlow)" opacity="0.6">MP3</text>
  <text x="50%" y="45%" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="100"
    fill="none" stroke="#4A2800" stroke-width="5" opacity="0.9">MP3</text>
  <text x="50%" y="45%" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="100"
    fill="url(#textGradient)">MP3</text>

  <!--
    PROCESSING: 各文字を個別に配置し、Y浮上＋フォントサイズ膨張のウェーブアニメーション
    dur=2.2s、文字ごとに0.14sずつ遅延（最終文字G: 1.26s）
    keyTimes="0;0.09;0.18;1" → 前9%で浮上、次9%で降下、残り82%静止
    => 全文字が浮いて戻る1波が約0.4sで終わり、2.2s周期で繰り返す
  -->
  <!-- P -->
  <text x="142" y="233" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#FF9800" opacity="0.9">P
    <animate attributeName="y"         values="233;225;233;233" keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.00s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
    <animate attributeName="font-size" values="18;21;18;18"     keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.00s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
  </text>
  <!-- R -->
  <text x="155" y="233" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#FF9800" opacity="0.9">R
    <animate attributeName="y"         values="233;225;233;233" keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.14s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
    <animate attributeName="font-size" values="18;21;18;18"     keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.14s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
  </text>
  <!-- O -->
  <text x="168" y="233" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#FF9800" opacity="0.9">O
    <animate attributeName="y"         values="233;225;233;233" keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.28s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
    <animate attributeName="font-size" values="18;21;18;18"     keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.28s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
  </text>
  <!-- C -->
  <text x="181" y="233" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#FF9800" opacity="0.9">C
    <animate attributeName="y"         values="233;225;233;233" keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.42s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
    <animate attributeName="font-size" values="18;21;18;18"     keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.42s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
  </text>
  <!-- E -->
  <text x="194" y="233" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#FF9800" opacity="0.9">E
    <animate attributeName="y"         values="233;225;233;233" keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.56s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
    <animate attributeName="font-size" values="18;21;18;18"     keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.56s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
  </text>
  <!-- S -->
  <text x="207" y="233" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#FF9800" opacity="0.9">S
    <animate attributeName="y"         values="233;225;233;233" keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.70s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
    <animate attributeName="font-size" values="18;21;18;18"     keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.70s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
  </text>
  <!-- S -->
  <text x="220" y="233" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#FF9800" opacity="0.9">S
    <animate attributeName="y"         values="233;225;233;233" keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.84s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
    <animate attributeName="font-size" values="18;21;18;18"     keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.84s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
  </text>
  <!-- I -->
  <text x="233" y="233" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#FF9800" opacity="0.9">I
    <animate attributeName="y"         values="233;225;233;233" keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.98s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
    <animate attributeName="font-size" values="18;21;18;18"     keyTimes="0;0.09;0.18;1" dur="2.2s" begin="0.98s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
  </text>
  <!-- N -->
  <text x="246" y="233" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#FF9800" opacity="0.9">N
    <animate attributeName="y"         values="233;225;233;233" keyTimes="0;0.09;0.18;1" dur="2.2s" begin="1.12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
    <animate attributeName="font-size" values="18;21;18;18"     keyTimes="0;0.09;0.18;1" dur="2.2s" begin="1.12s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
  </text>
  <!-- G -->
  <text x="259" y="233" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="18" fill="#FF9800" opacity="0.9">G
    <animate attributeName="y"         values="233;225;233;233" keyTimes="0;0.09;0.18;1" dur="2.2s" begin="1.26s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
    <animate attributeName="font-size" values="18;21;18;18"     keyTimes="0;0.09;0.18;1" dur="2.2s" begin="1.26s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1" />
  </text>

  <!-- 進捗パーセント表示（JSで更新） -->
  <text id="processing-percent" x="50%" y="310" text-anchor="middle"
    font-family="'Menlo', 'Monaco', monospace" font-size="15" fill="#FF9800" opacity="0.85">0%</text>
</svg>
