<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- ダークモード背景 -->
  <rect width="400" height="400" fill="#1a1a2e" />

  <!-- フィルター定義 -->
  <defs>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9800" stop-opacity="1" />
      <stop offset="100%" stop-color="#E68900" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <!-- リップルパルス：1波ループ -->
  <circle cx="200" cy="200" r="10" fill="#FF9800">
    <animate attributeName="r"       values="10;165" dur="1.5s" begin="0s" repeatCount="indefinite" calcMode="ease-out" />
    <animate attributeName="opacity" values="0.35;0" dur="1.5s" begin="0s" repeatCount="indefinite" />
  </circle>

  <!-- イコライザー風脈動円（ホバー強調値で固定） -->
  <circle cx="200" cy="200" r="108" fill="none" stroke="#FF9800" stroke-width="1.5" opacity="0.12"
    stroke-dasharray="2,6,4,6,5,6,3,6,6,6">
    <animate attributeName="r" values="108;112;108" dur="6s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.12;0.18;0.12" dur="6s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="rotate" values="0 200 200;360 200 200" dur="30s" repeatCount="indefinite" />
  </circle>

  <circle cx="200" cy="200" r="100" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.18"
    stroke-dasharray="5,4,8,4,3,4,10,4,6,4">
    <animate attributeName="r" values="100;104;100" dur="5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.18;0.24;0.18" dur="5s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="rotate" values="360 200 200;0 200 200" dur="20s" repeatCount="indefinite" />
  </circle>

  <circle cx="200" cy="200" r="94" fill="none" stroke="#FF9800" stroke-width="2.5" opacity="0.22"
    stroke-dasharray="3,3,6,3,9,3,4,3,7,3">
    <animate attributeName="r" values="94;96;94" dur="4s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.22;0.30;0.22" dur="4s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="rotate" values="0 200 200;360 200 200" dur="15s" repeatCount="indefinite" />
  </circle>

  <!-- メインテキスト（形式） -->
  <text x="50%" y="45%" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="100"
    fill="url(#textGradient)" filter="url(#softGlow)" opacity="0.6">
    MP3
  </text>
  <text x="50%" y="45%" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="100"
    fill="none" stroke="#4A2800" stroke-width="5" opacity="0.9">
    MP3
  </text>
  <text x="50%" y="45%" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="100"
    fill="url(#textGradient)">
    MP3
  </text>

  <!-- モード表示 -->
  <text x="50%" y="58%" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#e0e0e0" opacity="0.7">
    ENCODE
  </text>

  <!-- D&D案内（ホバー状態：オレンジ・全不透明・やや大きく） -->
  <text x="50%" y="75%" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#FF9800" opacity="1">
    DROP TO CONVERT
  </text>
</svg>
